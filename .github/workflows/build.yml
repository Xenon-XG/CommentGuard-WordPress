name: Build & Package Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Create plugin zip
        run: |
          mkdir -p dist
          rsync -av --exclude-from='.distignore' ./ dist/ai-comment-moderator/
          cd dist
          zip -r ai-comment-moderator.zip ai-comment-moderator/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-comment-moderator
          path: dist/ai-comment-moderator.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ai-comment-moderator.zip
